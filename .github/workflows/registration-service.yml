name: CI — Build Docker Image

on:
  push:
    branches: [master]
    paths:
      - 'services/registration-service/**'

permissions:
  contents: read
  packages: write



jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build Docker image
        run: docker build -t registration-service ./services/registration-service
    
  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/registration-service
          push: true
          tags: ghcr.io/mdobrianskyy/registration-service:latest
  deploy:
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Verify SSH key
        run: ssh-keygen -l -f ~/.ssh/deploy_key

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            cd ~/eventhub/
            git pull origin master
            docker compose up -d --build registration-service
          "