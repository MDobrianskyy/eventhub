global:
  scrape_interval: 15s

scrape_configs:
  - job_name: event
    static_configs:
      - targets: ["event-service:5001"]
  - job_name: registration
    static_configs:
      - targets: ["registration-service:5002"]
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]